<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Park Like a Gentleman</title>
        <meta name="description" content="Create a printable parking contact page from your phone number.">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
        <style>
            :root {
                --ink: #171717;
                --muted: #5d6470;
                --paper: #ffffff;
                --surface: #f6f7f9;
                --line: #d8dee8;
                --yellow: #ffd134;
                --red: #c62828;
                --green: #1f7a4d;
                --blue: #2457a6;
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                min-height: 100%;
            }

            body {
                background: var(--surface);
                color: var(--ink);
                font-family: "Cairo", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }

            button,
            input {
                font: inherit;
            }

            .app-shell {
                display: grid;
                grid-template-columns: minmax(280px, 390px) minmax(320px, 1fr);
                min-height: 100vh;
            }

            .controls {
                align-content: center;
                background: #ffffff;
                border-left: 1px solid var(--line);
                display: grid;
                gap: 24px;
                padding: 40px clamp(20px, 4vw, 48px);
            }

            .brand {
                display: grid;
                gap: 8px;
            }

            .brand-mark {
                align-items: center;
                background: var(--ink);
                border-radius: 8px;
                color: var(--yellow);
                display: inline-flex;
                font-size: 17px;
                font-weight: 900;
                height: 44px;
                justify-content: center;
                width: 44px;
            }

            h1 {
                font-size: clamp(30px, 4vw, 46px);
                line-height: 1.15;
                margin: 0;
            }

            .tagline {
                color: var(--muted);
                font-size: 17px;
                line-height: 1.7;
                margin: 0;
            }

            form {
                display: grid;
                gap: 14px;
            }

            label {
                color: #2d333b;
                font-size: 15px;
                font-weight: 700;
            }

            .phone-input {
                background: #fbfcfd;
                border: 2px solid var(--line);
                border-radius: 8px;
                direction: ltr;
                font-size: 22px;
                font-weight: 700;
                letter-spacing: 1px;
                outline: none;
                padding: 14px 16px;
                text-align: left;
                transition: border-color 160ms ease, box-shadow 160ms ease;
                width: 100%;
            }

            .phone-input:focus {
                border-color: var(--blue);
                box-shadow: 0 0 0 4px rgba(36, 87, 166, 0.13);
            }

            .actions {
                display: grid;
                gap: 10px;
                grid-template-columns: 1fr auto;
            }

            .button {
                align-items: center;
                border: 0;
                border-radius: 8px;
                cursor: pointer;
                display: inline-flex;
                font-weight: 900;
                gap: 10px;
                justify-content: center;
                min-height: 52px;
                padding: 0 18px;
                transition: opacity 160ms ease, transform 160ms ease;
            }

            .button:active {
                transform: translateY(1px);
            }

            .button-primary {
                background: var(--green);
                color: #ffffff;
            }

            .button-secondary {
                background: #e9edf3;
                color: var(--ink);
                min-width: 56px;
                padding: 0;
            }

            .button svg {
                height: 21px;
                width: 21px;
            }

            .status {
                color: var(--muted);
                font-size: 14px;
                min-height: 24px;
            }

            .sr-only {
                border: 0;
                clip: rect(0 0 0 0);
                height: 1px;
                margin: -1px;
                overflow: hidden;
                padding: 0;
                position: absolute;
                white-space: nowrap;
                width: 1px;
            }

            .preview-area {
                align-items: center;
                display: flex;
                justify-content: center;
                overflow: auto;
                padding: clamp(18px, 4vw, 52px);
            }

            .poster-wrap {
                width: min(100%, 720px);
            }

            .a4-poster {
                align-items: center;
                aspect-ratio: 210 / 297;
                background: var(--paper);
                border: clamp(8px, 2.1vw, 20px) solid var(--yellow);
                border-radius: 18px;
                box-shadow: 0 22px 50px rgba(17, 24, 39, 0.16);
                display: flex;
                flex-direction: column;
                justify-content: center;
                margin: 0 auto;
                overflow: hidden;
                padding: clamp(22px, 4.2vw, 52px);
                text-align: center;
                width: 100%;
            }

            .poster-icon {
                display: block;
                height: clamp(72px, 13vw, 132px);
                object-fit: contain;
                width: clamp(72px, 13vw, 132px);
            }

            .a4-poster h2 {
                color: #111111;
                font-size: clamp(33px, 6.4vw, 66px);
                font-weight: 900;
                line-height: 1.18;
                margin: 18px 0 0;
            }

            .poster-copy {
                color: #414751;
                font-size: clamp(22px, 4.2vw, 42px);
                font-weight: 700;
                line-height: 1.48;
                margin: clamp(16px, 3vw, 32px) 0;
            }

            .phone-number {
                background: #fff5f5;
                border: clamp(3px, 0.9vw, 7px) dashed var(--red);
                border-radius: 14px;
                color: var(--red);
                direction: ltr;
                font-size: clamp(36px, 8.8vw, 90px);
                font-weight: 900;
                letter-spacing: clamp(1px, 0.45vw, 6px);
                line-height: 1.1;
                margin: clamp(12px, 3vw, 34px) 0;
                max-width: 100%;
                overflow-wrap: anywhere;
                padding: clamp(12px, 2vw, 22px) clamp(16px, 4vw, 52px);
            }

            .footer {
                color: #626a75;
                font-size: clamp(20px, 3.4vw, 34px);
                font-weight: 700;
                margin-top: clamp(12px, 2.4vw, 28px);
            }

            @page {
                margin: 0;
                size: A4;
            }

            @media (max-width: 840px) {
                .app-shell {
                    grid-template-columns: 1fr;
                }

                .controls {
                    align-content: start;
                    border-left: 0;
                    border-bottom: 1px solid var(--line);
                    padding-block: 26px;
                }

                .preview-area {
                    align-items: start;
                }
            }

            @media print {
                body {
                    background: #ffffff;
                }

                .controls {
                    display: none;
                }

                .app-shell,
                .preview-area,
                .poster-wrap {
                    display: block;
                    min-height: 0;
                    padding: 0;
                    width: 210mm;
                }

                .a4-poster {
                    border: 20px solid var(--yellow);
                    border-radius: 0;
                    box-shadow: none;
                    height: 297mm;
                    width: 210mm;
                    -webkit-print-color-adjust: exact;
                    print-color-adjust: exact;
                }
            }
        </style>
    </head>
    <body>
        <main class="app-shell">
            <section class="controls" aria-label="مولد لوحة الوقوف">
                <div class="brand">
                    <span class="brand-mark" aria-hidden="true">P</span>
                    <h1>Park Like a Gentleman</h1>
                    <p class="tagline">اكتب رقمك وافتح نافذة الطباعة لحفظ اللوحة PDF أو طباعتها مباشرة.</p>
                </div>

                <form id="posterForm">
                    <label for="phoneInput">رقم الهاتف</label>
                    <input class="phone-input" id="phoneInput" inputmode="tel" autocomplete="tel" name="phone" placeholder="01065478654" value="01065478654" required>
                    <div class="actions">
                        <button class="button button-primary" id="printPosterButton" type="submit">
                            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M7 8V4h10v4M7 17H5a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2M7 14h10v6H7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                            طباعة / حفظ PDF
                        </button>
                        <button class="button button-secondary" id="printButton" type="button" title="طباعة">
                            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M7 8V4h10v4M7 17H5a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2M7 14h10v6H7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                            <span class="sr-only">طباعة</span>
                        </button>
                    </div>
                    <div class="status" id="status" role="status" aria-live="polite"></div>
                </form>
            </section>

            <section class="preview-area" aria-label="معاينة اللوحة">
                <div class="poster-wrap">
                    <article class="a4-poster" id="poster">
                        <img src="Icons/car.png" class="poster-icon" alt="">
                        <h2>عذراً على الإزعاج</h2>
                        <p class="poster-copy">إذا كانت سيارتي تعيق حركتك،<br>برجاء الاتصال بي فوراً على:</p>
                        <div class="phone-number" id="posterPhone">01065478654</div>
                        <img src="Icons/phone.png" class="poster-icon" alt="">
                        <div class="footer">شكراً لتفهمكم وذوقكم</div>
                    </article>
                </div>
            </section>
        </main>

        <script>
            const form = document.querySelector("#posterForm");
            const input = document.querySelector("#phoneInput");
            const posterPhone = document.querySelector("#posterPhone");
            const status = document.querySelector("#status");
            const printButton = document.querySelector("#printButton");

            const normalizePhone = (value) => value.replace(/[^\d+]/g, "").slice(0, 18);

            const setStatus = (message) => {
                status.textContent = message;
            };

            const syncPoster = () => {
                const normalized = normalizePhone(input.value);
                input.value = normalized;
                posterPhone.textContent = normalized || "01065478654";
                return normalized;
            };

            input.addEventListener("input", () => {
                syncPoster();
                setStatus("");
            });

            const printPoster = () => {
                const phone = syncPoster();

                if (phone.replace(/\D/g, "").length < 8) {
                    input.focus();
                    setStatus("برجاء إدخال رقم هاتف صحيح.");
                    return;
                }

                setStatus("اختر الطابعة أو Save as PDF من نافذة الطباعة.");
                window.print();
            };

            printButton.addEventListener("click", printPoster);

            form.addEventListener("submit", (event) => {
                event.preventDefault();
                printPoster();
            });

            syncPoster();
        </script>
    </body>
</html>
